name: Job Scraper Bot

on:
  workflow_dispatch: # הרצה ידנית
  schedule:
    - cron: '0 8,20 * * *' # פעמיים ביום

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Bot
        env:
          # כאן אנחנו מחברים את ה-Secrets שהגדרת לקוד הפייתון
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        # הרצת הקובץ המרכזי מתוך תיקיית src
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python src/main.py

      - name: Commit and Push results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/*.json
          git commit -m "Update job listings [skip ci]" || echo "No changes to commit"
          git push
